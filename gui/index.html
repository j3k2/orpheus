<!DOCTYPE html>
<html>
<head>
    <script defer src="/alpine.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/water.css@2/out/water.css">
    <title>orpheus</title>
</head>
<body>
    <div x-data="{
        imageLinks: [],
        isCapturing: false,
        isClearing: false,
        async fetchImageLinks() {
            try {
                const res = await fetch('/files');
                const data = await res.json();
                this.imageLinks = Array.isArray(data) ? data : [];
            } catch (e) { console.error(e); }
        },
        async postCapture() {
            this.isCapturing = true;
            try {
                const res = await fetch('/capture', { method: 'POST' });
                const data = await res.json();
                if (data) this.imageLinks = [...this.imageLinks, data];
            } catch (e) { console.error(e); }
            finally { this.isCapturing = false; }
        },
        async postClear() {
            const confirmed = window.confirm('Are you sure you want to delete all images?')
            if (confirmed) {
                this.isClearing = true;
                try {
                    const res = await fetch('/clear', { method: 'POST' });
                    this.imageLinks = [];
                } catch (e) { console.error(e); }
                finally { this.isClearing = false; }
            }
        }
    }" x-init="fetchImageLinks()">
        <button @click="postCapture()" :disabled="isCapturing || isClearing">
            <span x-text="isCapturing ? 'Capturing...' : 'Capture'">Capture</span>
        </button>

        <ul>    
        <template x-for="(link, index) in imageLinks" :key="index">
            <li>
                <a :href="'/files/' + link" x-text="link"></a>
            </li>
        </template>
        </ul>
        <button x-show="imageLinks.length > 0" @click="postClear()" :disabled="isCapturing || isClearing">
            <span x-text="isClearing ? 'Clearing...' : 'Clear'">Clear</span>
        </button>
    </div>
</body>
</html>
